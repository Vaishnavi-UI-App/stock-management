server {
    listen 80;
    server_name dynamicindia.dynamiccropscience.de;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name dynamicindia.dynamiccropscience.de;

    ssl_certificate /etc/letsencrypt/live/dynamicindia.dynamiccropscience.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dynamicindia.dynamiccropscience.de/privkey.pem;

    client_max_body_size 20m;

    location /api/ {
        proxy_pass http://127.0.0.1:3101/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:8083/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
